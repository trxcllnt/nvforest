# Dependency list for https://github.com/rapidsai/dependency-file-generator
files:
  all:
    output: conda
    matrix:
      cuda: ["12.9", "13.2"]
      arch: [x86_64, aarch64]
    includes:
      - common_build
      - cuda
      - cuda_version
      - depends_on_cuda_python
      - depends_on_cupy
      - depends_on_libraft
      - depends_on_librmm
      - depends_on_pylibraft
      - depends_on_rapids_logger
      - develop
      - docs
      - py_build_nvforest
      - py_run_nvforest
      - py_version
      - rapids_build_backend
      - test_python
      - test_python_xgboost
  devcontainers:
    output: none
    includes:
      # "devcontainers" includes everything in "all", excluding test_python_xgboost
      - common_build
      - cuda
      - cuda_version
      - depends_on_cuda_python
      - depends_on_cupy
      - depends_on_libraft
      - depends_on_librmm
      - depends_on_pylibraft
      - depends_on_rapids_logger
      - py_build_nvforest
      - py_run_nvforest
      - py_version
      - rapids_build_backend
      - test_python
  cpp_all:
    output: conda
    matrix:
      cuda: ["12.9", "13.2"]
      arch: [x86_64]
    includes:
      - common_build
      - cuda
      - cuda_version
      - depends_on_libraft_headers
      - depends_on_librmm
  checks:
    output: none
    includes:
      - checks
      - py_version
  clang_tidy:
    output: conda
    matrix:
      cuda: ["12.9", "13.2"]
      arch: [x86_64]
    includes:
      - clang_tidy
      - common_build
      - cuda
      - cuda_version
      - depends_on_libraft_headers
      - depends_on_librmm
  docs:
    output: none
    includes:
      - cuda_version
      - docs
      - py_version
      - depends_on_nvforest
      - depends_on_libnvforest
  test_cpp:
    output: none
    includes:
      - cuda_version
      - depends_on_libnvforest
      - test_libnvforest
      - test_cpp
  test_python:
    output: none
    includes:
      - cuda_version
      - depends_on_nvforest
      - depends_on_libnvforest
      - py_version
      - test_python
      - test_python_xgboost
  py_build_nvforest:
    output: pyproject
    pyproject_dir: python/nvforest
    extras:
      table: build-system
    includes:
      - rapids_build_backend
  py_rapids_build_nvforest:
    output: pyproject
    pyproject_dir: python/nvforest
    extras:
      table: tool.rapids-build-backend
      key: requires
    includes:
      - common_build
      - depends_on_cuda_python
      - depends_on_libnvforest
      - depends_on_libraft
      - depends_on_librmm
      - depends_on_pylibraft
      - py_build_nvforest
  py_run_nvforest:
    output: pyproject
    pyproject_dir: python/nvforest
    extras:
      table: project
    includes:
      - depends_on_cuda_python
      - depends_on_cupy
      - depends_on_libnvforest
      - depends_on_pylibraft
      - py_run_nvforest
  py_test_nvforest:
    output: pyproject
    pyproject_dir: python/nvforest
    extras:
      table: project.optional-dependencies
      key: test
    includes:
      - test_python
      - test_python_xgboost
  py_build_libnvforest:
    output: pyproject
    pyproject_dir: python/libnvforest
    extras:
      table: build-system
    includes:
      - rapids_build_backend
  py_rapids_build_libnvforest:
    output: pyproject
    pyproject_dir: python/libnvforest
    extras:
      table: tool.rapids-build-backend
      key: requires
    includes:
      - common_build
      - depends_on_libraft
      - depends_on_librmm
      - depends_on_rapids_logger
  py_run_libnvforest:
    output: pyproject
    pyproject_dir: python/libnvforest
    extras:
      table: project
    includes:
      - depends_on_libraft
      - depends_on_librmm
      - depends_on_rapids_logger
channels:
  - rapidsai-nightly
  - rapidsai
  - conda-forge
dependencies:
  rapids_build_backend:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - rapids-build-backend>=0.4.0,<0.5.0.dev0
      - output_types: [conda]
        packages:
          - scikit-build-core>=0.11.0
      - output_types: [requirements, pyproject]
        packages:
          - scikit-build-core[pyproject]>=0.11.0
  checks:
    common:
      - output_types: [conda, requirements]
        packages:
          - pre-commit
  clang_tidy:
    common:
      - output_types: [conda, requirements]
        packages:
          # clang 15 required by libcudacxx.
          - clang==15.0.7
          - clang-tools==15.0.7
          - llvm-openmp==15.0.7
          - ninja
          - tomli
  common_build:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - &cmake_ver cmake>=4.0
          - ninja
      - output_types: conda
        packages:
          - c-compiler
          - cuda-nvcc
          - cxx-compiler
    specific:
      - output_types: conda
        matrices:
          - matrix:
              arch: x86_64
            packages:
              - gcc_linux-64=14.*
              - sysroot_linux-64==2.28
          - matrix:
              arch: aarch64
            packages:
              - gcc_linux-aarch64=14.*
              - sysroot_linux-aarch64==2.28
  develop:
    common:
      - output_types: [conda, requirements]
        packages:
          - pre-commit
      - output_types: conda
        packages:
          - ccache
  py_build_nvforest:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - cython>=3.0.0
          - &treelite treelite>=4.6.1,<5.0
  py_run_nvforest:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - numpy>=1.23,<3.0a0
          - &scikit_learn scikit-learn>=1.5
          - *treelite
  # 'cuda_version' intentionally does not contain fallback entries... we want
  # a loud error if an unsupported 'cuda' value is passed
  cuda_version:
    specific:
      - output_types: conda
        matrices:
          - matrix:
              cuda: "12.2"
            packages:
              - cuda-version=12.2
          - matrix:
              cuda: "12.5"
            packages:
              - cuda-version=12.5
          - matrix:
              cuda: "12.8"
            packages:
              - cuda-version=12.8
          - matrix:
              cuda: "12.9"
            packages:
              - cuda-version=12.9
          - matrix:
              cuda: "13.0"
            packages:
              - cuda-version=13.0
          - matrix:
              cuda: "13.1"
            packages:
              - cuda-version=13.1
          - matrix:
              cuda: "13.2"
            packages:
              - cuda-version=13.2
      - output_types: requirements
        matrices:
          # if use_cuda_wheels=false is provided, do not add dependencies on any CUDA wheels
          # (e.g. for DLFW and pip devcontainers)
          - matrix:
              use_cuda_wheels: "false"
            packages:
          - matrix:
              arch: aarch64
              cuda: "12.2"
              use_cuda_wheels: "true"
            packages:
              # some components (like nvidia-cublas-cu12 and nvidia-cuda-nvcc-cu12) didn't have
              # aarch64 wheels until CTK 12.3, so allow a slightly looser bound here
              - cuda-toolkit>=12.2,<12.4
          - matrix:
              cuda: "12.2"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.2.*
          - matrix:
              cuda: "12.5"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.5.*
          - matrix:
              cuda: "12.8"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.8.*
          - matrix:
              cuda: "12.9"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.9.*
          - matrix:
              cuda: "13.0"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.0.*
          - matrix:
              cuda: "13.1"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.1.*
          - matrix:
              cuda: "13.2"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.2.*
  cuda:
    common:
      - output_types: [conda]
        packages:
          - cuda-cudart-dev
          - cuda-profiler-api
  docs:
    common:
      - output_types: [conda, requirements]
        packages:
          - breathe
          - graphviz
          - numpydoc
          - &packaging packaging
          - pydata-sphinx-theme
          - sphinx
          - sphinx-copybutton
          - sphinx-markdown-tables
      - output_types: conda
        packages:
          - doxygen
  py_version:
    specific:
      - output_types: conda
        matrices:
          - matrix:
              py: "3.11"
            packages:
              - python=3.11
          - matrix:
              py: "3.12"
            packages:
              - python=3.12
          - matrix:
              py: "3.13"
            packages:
              - python=3.13
          - matrix:
              py: "3.14"
            packages:
              - python=3.14
          - matrix:
            packages:
              - python>=3.11
  test_libnvforest:
    common:
      - output_types: conda
        packages:
          - libnvforest-tests==26.8.*,>=0.0.0a0
  test_cpp:
    common:
      - output_types: conda
        packages:
          - *cmake_ver
  test_python:
    specific:
      - output_types: [conda, requirements]
        matrices:
          # Package versions to user for the "oldest-dep" CI run
          - matrix: {dependencies: "oldest"}
            packages:
              - scikit-learn==1.5.0
          - matrix:
            packages:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - *packaging
          - pandas
          - pytest
          - pytest-cov
          - pytest-xdist
          - *scikit_learn
  test_python_xgboost:
    common:
      - output_types: [conda]
        packages:
          # We must separate xgboost into its own list so that it is not
          # included in the "devcontainers" key. The libxgboost package depends
          # on librmm but we do not want to have a package depending on librmm
          # in devcontainers since it should be built from source.
          - rapids-xgboost==26.8.*,>=0.0.0a0
      - output_types: [requirements, pyproject]
        packages:
          - xgboost>=2.1.0
  depends_on_cuda_python:
    specific:
      - output_types: [conda, requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
            packages:
              - cuda-python>=12.9.2,<13.0a0
          # fallback to CUDA 13 versions if 'cuda' is '13.*' or not provided
          - matrix:
            packages:
              - cuda-python>=13.0.1,<14.0a0
  depends_on_nvforest:
    common:
      - output_types: conda
        packages:
          - nvforest==26.8.*,>=0.0.0a0
  depends_on_cupy:
    common:
      - output_types: conda
        packages:
          - cupy>=13.6.0
    # NOTE: This is intentionally not broken into groups by a 'cuda_suffixed' selector like
    #       other packages with -cu{nn}x suffixes in this file.
    #       All RAPIDS wheel builds (including in devcontainers) expect cupy to be suffixed.
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
            packages:
              - cupy-cuda12x>=13.6.0
          # fallback to CUDA 13 versions if 'cuda' is '13.*' or not provided
          - matrix:
            packages:
              - cupy-cuda13x>=13.6.0
  depends_on_libnvforest:
    common:
      - output_types: conda
        packages:
          - &libnvforest_unsuffixed libnvforest==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - libnvforest-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - libnvforest-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*libnvforest_unsuffixed]}
  depends_on_libraft:
    common:
      - output_types: conda
        packages:
          - &libraft_unsuffixed libraft==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - libraft-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - libraft-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*libraft_unsuffixed]}
  depends_on_libraft_headers:
    common:
      - output_types: conda
        packages:
          - libraft-headers==26.8.*,>=0.0.0a0
  depends_on_librmm:
    common:
      - output_types: conda
        packages:
          - &librmm_unsuffixed librmm==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - librmm-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - librmm-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*librmm_unsuffixed]}
  depends_on_pylibraft:
    common:
      - output_types: conda
        packages:
          - &pylibraft_unsuffixed pylibraft==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - pylibraft-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - pylibraft-cu13==26.8.*,>=0.0.0a0
          - matrix:
            packages:
              - *pylibraft_unsuffixed
  depends_on_rapids_logger:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - rapids-logger==0.2.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
