[build-system]
build-backend = "rapids_build_backend.build"
requires = [
    "rapids-build-backend>=0.4.0,<0.5.0.dev0",
    "scikit-build-core[pyproject]>=0.11.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[tool.pydistcheck]
select = [
    "distro-too-large-compressed",
]

# detect when package size grows significantly
max_allowed_size_compressed = '20M'

[project]
name = "nvforest"
dynamic = ["version"]
description = "nvForest"
readme = { file = "README.md", content-type = "text/markdown" }
authors = [
    { name = "NVIDIA Corporation" },
]
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "cuda-python>=13.0.1,<14.0a0",
    "cupy-cuda13x>=13.6.0",
    "libnvforest==26.8.*,>=0.0.0a0",
    "numpy>=1.23,<3.0a0",
    "pylibraft==26.8.*,>=0.0.0a0",
    "scikit-learn>=1.5",
    "treelite>=4.6.1,<5.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.
classifiers = [
    "Intended Audience :: Developers",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.optional-dependencies]
test = [
    "click",
    "packaging",
    "pandas",
    "pytest",
    "pytest-cov",
    "pytest-xdist",
    "scikit-learn>=1.5",
    "xgboost>=2.1.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[project.urls]
Homepage = "https://github.com/rapidsai/nvforest"
Documentation = "https://docs.rapids.ai/api/nvforest/stable/"

[tool.black]
line-length = 79
target-version = ["py311"]
include = '\.py?$'
force-exclude = '''
_stop_words\.py |
_version\.py |
versioneer\.py |
/(
    \.eggs |
    \.git |
    \.hg |
    \.mypy_cache |
    \.tox |
    \.venv |
    _build |
    _thirdparty |
    buck-out |
    build |
    dist |
    thirdparty
)/
'''

[tool.isort]
profile = "black"
line_length = 79

[tool.rapids-build-backend]
build-backend = "scikit_build_core.build"
dependencies-file = "../../dependencies.yaml"
matrix-entry = "cuda_suffixed=true;use_cuda_wheels=true"
requires = [
    "cmake>=4.0",
    "cuda-python>=13.0.1,<14.0a0",
    "cython>=3.0.0",
    "libnvforest==26.8.*,>=0.0.0a0",
    "libraft==26.8.*,>=0.0.0a0",
    "librmm==26.8.*,>=0.0.0a0",
    "ninja",
    "pylibraft==26.8.*,>=0.0.0a0",
    "treelite>=4.6.1,<5.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[tool.scikit-build]
build-dir = "build/{wheel_tag}"
cmake.build-type = "Release"
cmake.version = "CMakeLists.txt"
minimum-version = "build-system.requires"
ninja.make-fallback = false
sdist.exclude = ["*tests*"]
sdist.reproducible = true
wheel.packages = ["nvforest"]
wheel.py-api = "cp311" # overridden in CI builds by arguments from `ci/build_wheel_*.sh` scripts.

[tool.scikit-build.metadata.version]
provider = "scikit_build_core.metadata.regex"
input = "nvforest/VERSION"
regex = "(?P<value>.*)"
